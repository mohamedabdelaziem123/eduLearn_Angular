<div class="flex flex-col min-h-screen w-full bg-[#f8f9fc] font-inter text-slate-800">
    <!-- Main Top Nav Bar -->
    <app-nav-bar [isTeacherNav]="true" activeRoute="questions"></app-nav-bar>

    <main class="flex-1 overflow-y-auto px-8 py-10">
        <div class="max-w-[1400px] mx-auto flex flex-col gap-8">
            
            <!-- HEADER -->
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div class="flex flex-col">
                    <h2 class="text-[32px] font-extrabold text-[#111827] tracking-tight">Questions Bank</h2>
                    <p class="text-slate-500 mt-1 text-[15px] font-medium">
                        Manage and organize your course assessment questions.
                    </p>
                </div>
                <!-- Dynamic or absolute "+ Add New Question" trigger if exists -->
                <button [routerLink]="'/questions/create'" class="px-5 py-3 rounded-xl bg-blue-600 text-white font-bold text-sm flex items-center gap-2 hover:bg-blue-700 transition-all shadow-sm">
                    <span class="material-symbols-outlined text-[18px]">add</span> Add New Question
                </button>
            </div>

            <!-- Dashboard Layout (Grid) -->
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                
                <!-- LEFT COLUMN: Filters (3 cols) -->
                <div class="col-span-1 lg:col-span-3 flex flex-col gap-6 bg-white rounded-2xl border border-gray-100 shadow-sm p-6 sticky top-24">
                    <div class="flex items-center gap-2 pb-4 border-b border-gray-50">
                        <span class="material-symbols-outlined text-blue-600 text-[20px]">filter_list</span>
                        <h3 class="text-base font-bold text-slate-900">Filters</h3>
                    </div>

                    <!-- Course Switcher -->
                    <div class="flex flex-col gap-2">
                        <label class="text-[12px] uppercase font-extrabold text-slate-400 tracking-wider">Select Course</label>
                        <app-dropdown-menu 
                            [options]="courseDropdownOptions" 
                            [selectedValue]="selectedCourse?._id || selectedCourse?.id"
                            (selectionChange)="onCourseSelectDropdown($event)"
                            placeholder="Select a course">
                        </app-dropdown-menu>
                    </div>

                    <!-- Lesson Switcher -->
                    <div class="flex flex-col gap-2">
                        <label class="text-[12px] uppercase font-extrabold text-slate-400 tracking-wider">Select Lesson</label>
                        
                        <div *ngIf="isLoadingLessons" class="flex justify-center p-4">
                            <div class="animate-spin rounded-full h-5 w-5 border-b-2 border-blue-600"></div>
                        </div>

                        <div *ngIf="!isLoadingLessons && lessons.length === 0" class="text-sm text-slate-400 p-2">
                            No lessons found.
                        </div>

                        <div *ngIf="!isLoadingLessons && lessons.length > 0" class="flex flex-col gap-1">
                            <button *ngFor="let lesson of lessons; let i = index" 
                                    (click)="selectLesson(lesson)"
                                    [class]="(lesson._id || lesson.id) === (selectedLesson?._id || selectedLesson?.id) 
                                        ? 'flex items-center text-left px-4 py-3 rounded-xl bg-blue-50 text-blue-700 font-bold border border-blue-100 transition-all text-sm' 
                                        : 'flex items-center text-left px-4 py-3 rounded-xl bg-white text-slate-600 font-medium hover:bg-slate-50 transition-all text-sm'">
                                Lesson {{ i + 1 }}: {{ lesson.title }}
                            </button>
                        </div>
                    </div>
                </div>

                <!-- RIGHT COLUMN: Questions (9 cols) -->
                <div class="col-span-1 lg:col-span-9 flex flex-col gap-6">
                    
                    <!-- Search Bar Header -->
                    <div class="bg-white rounded-2xl border border-gray-100 p-4 shadow-sm flex items-center gap-4">
                        <div class="relative flex-1">
                            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">search</span>
                            <input [formControl]="searchControl" type="text" placeholder="Search in this lesson..." 
                                   class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-gray-200 bg-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        </div>

                    </div>

                    <!-- Questions List -->
                    <div *ngIf="isLoadingQuestions" class="flex justify-center p-16 bg-white rounded-2xl border border-gray-200">
                        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
                    </div>

                    <div *ngIf="!isLoadingQuestions && (!filteredQuestions || filteredQuestions.length === 0)" 
                         class="flex flex-col items-center justify-center p-16 bg-white rounded-2xl border border-gray-200 text-slate-500">
                        <span class="material-symbols-outlined text-[48px] text-slate-300 mb-4">search_off</span>
                        <p class="font-semibold text-slate-700">No questions found</p>
                        <p class="text-sm">Try creating a question or adjusting your filters.</p>
                    </div>

                    <div *ngIf="!isLoadingQuestions && filteredQuestions.length > 0" class="flex flex-col gap-4">
                        <div *ngFor="let q of filteredQuestions" class="bg-white rounded-xl border border-gray-100 shadow-sm p-6 flex flex-col gap-4 relative">
                            
                            <!-- Card Header -->
                            <div class="flex items-start justify-between">
                                <div class="flex items-center gap-2">
                                    <span *ngIf="q.difficulty" 
                                          [class]="q.difficulty === 'HARD' ? 'px-2.5 py-1 bg-red-50 text-red-700 text-[10px] uppercase font-bold tracking-wider rounded-md' : q.difficulty === 'MEDIUM' ? 'px-2.5 py-1 bg-amber-50 text-amber-700 text-[10px] uppercase font-bold tracking-wider rounded-md' : 'px-2.5 py-1 bg-green-50 text-green-700 text-[10px] uppercase font-bold tracking-wider rounded-md'">
                                        {{ q.difficulty }}
                                    </span>
                                    <h4 class="text-base font-bold text-[#111827] leading-snug">{{ q.title }}</h4>
                                </div>
                                <div class="flex items-center gap-1">
                                    <button (click)="deleteQuestion(q._id || q.id)" class="p-2 text-slate-400 hover:text-red-600 rounded-lg hover:bg-red-50 transition-colors">
                                        <span class="material-symbols-outlined text-[20px]">delete</span>
                                    </button>
                                </div>
                            </div>

                            <!-- Answer Options Grid Layout as Mockup -->
                            <div class="flex flex-col gap-2 mt-2">
                                <div *ngFor="let opt of q.options; let j = index" 
                                     [class]="opt.isCorrect 
                                        ? 'flex items-center justify-between p-4 rounded-xl bg-green-50 border border-green-200 text-green-800' 
                                        : 'flex items-center p-4 rounded-xl bg-slate-50 border border-transparent text-slate-700'">
                                    
                                    <div class="flex items-center gap-4">
                                        <!-- Index Badge Prefix: A, B, C, D -->
                                        <div [class]="opt.isCorrect 
                                            ? 'w-7 h-7 flex items-center justify-center rounded-lg bg-green-600 text-white font-bold text-xs flex-shrink-0' 
                                            : 'w-7 h-7 flex items-center justify-center rounded-lg bg-slate-200 text-slate-600 font-bold text-xs flex-shrink-0'">
                                            {{ ['A','B','C','D','E','F'][j] }}
                                        </div>
                                        <span class="font-semibold text-sm">{{ opt.text }}</span>
                                    </div>

                                    <span *ngIf="opt.isCorrect" class="material-symbols-outlined text-green-600 font-bold text-[20px]">check_circle</span>
                                </div>
                            </div>

                        </div>
                    </div>

                    <!-- Footer / Pagination -->
                    <button *ngIf="!isLoadingQuestions && filteredQuestions.length > 5" class="mx-auto px-6 py-2.5 bg-white border border-gray-100 text-blue-600 text-sm font-bold rounded-xl hover:bg-blue-50 transition-colors shadow-sm">
                        Load More Questions
                    </button>
                    
                </div>
            </div>

        </div>
    </main>
</div>
