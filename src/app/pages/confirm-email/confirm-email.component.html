<div class="min-h-screen bg-slate-50 flex flex-col font-inter text-slate-800">

    <!-- Minimal Header -->
    <header class="w-full px-8 py-6 flex items-center justify-between col-span-12 shrink-0">
        <!-- Brand -->
        <a routerLink="/login"
            class="flex items-center gap-2 font-extrabold text-2xl text-slate-900 transition-opacity hover:opacity-80">
            <svg class="w-8 h-8 text-indigo-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                fill="currentColor">
                <path
                    d="M12 3L1 9l4 2.18V15c0 1.1.9 2 2 2h10a2 2 0 002-2v-3.82L23 9 12 3zm6 12H6v-2.73L12 15l6-2.73V15z" />
            </svg>
            <span>eduLearn</span>
        </a>
    </header>

    <!-- Main Content Centered -->
    <main class="flex-1 flex flex-col items-center justify-center px-4 w-full max-w-xl mx-auto -mt-16 text-center">

        <!-- Breadcrumb -->
        <div class="flex items-center gap-3 text-sm font-semibold mb-10">
            <span class="text-slate-400">Account Creation</span>
            <span class="text-slate-300">›</span>
            <span class="text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full">Email Verification</span>
        </div>

        <!-- Mail Check Icon -->
        <div class="w-16 h-16 bg-blue-100 text-blue-700 rounded-2xl flex items-center justify-center mb-6 shadow-inner">
            <svg class="w-8 h-8" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                <path
                    d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2zm-4.5 9l-3.5-3.5 1.41-1.41L15.5 14.17l5.59-5.59L22.5 10 15.5 17z" />
            </svg>
        </div>

        <!-- Titles -->
        <div class="mb-8">
            <h1 class="text-3xl font-extrabold text-slate-900 mb-3 tracking-tight">Verify your email</h1>
            <p class="text-slate-500 font-medium max-w-sm mx-auto">We've sent a 6-digit code to your email. Please enter
                it below to continue.</p>
        </div>

        <!-- OTP Form -->
        <form (submit)="onSubmit(); $event.preventDefault()" class="w-full max-w-md mx-auto flex flex-col gap-6">

            <div class="flex justify-center gap-2 sm:gap-4 mb-2">
                <input *ngFor="let control of otpForm.controls; let i = index" #otpInput [formControl]="getControl(i)"
                    type="text" maxlength="1" (keydown)="onKeyDown($event, i)" (input)="onInput($event, i)"
                    class="w-12 h-12 sm:w-14 sm:h-14 text-center text-xl font-bold bg-white border border-slate-200 rounded-lg text-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 shadow-sm"
                    [autofocus]="i === 0">
            </div>

            <!-- Messages -->
            <div *ngIf="errorMessage"
                class="p-3 bg-red-50 text-red-600 rounded-xl text-sm font-semibold border border-red-100 flex items-start gap-2">
                <svg class="w-5 h-5 shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"
                    fill="currentColor">
                    <path fill-rule="evenodd"
                        d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
                        clip-rule="evenodd" />
                </svg>
                <span>{{ errorMessage }}</span>
            </div>

            <div *ngIf="successMessage"
                class="p-3 bg-green-50 text-green-700 rounded-xl text-sm font-semibold border border-green-100 flex items-start gap-2">
                <svg class="w-5 h-5 shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"
                    fill="currentColor">
                    <path fill-rule="evenodd"
                        d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
                        clip-rule="evenodd" />
                </svg>
                <span>{{ successMessage }}</span>
            </div>

            <button type="submit" [disabled]="!isFormValid || isLoading"
                class="w-full py-4 bg-blue-700 text-white font-bold rounded-2xl shadow-lg shadow-blue-700/30 hover:bg-blue-800 disabled:opacity-70 disabled:cursor-not-allowed transition-all flex items-center justify-center gap-2">
                <span *ngIf="!isLoading">Confirm Email</span>
                <svg *ngIf="!isLoading" class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"
                    fill="currentColor">
                    <path fill-rule="evenodd"
                        d="M12.293 5.293a1 1 0 011.414 0l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-2.293-2.293a1 1 0 010-1.414z"
                        clip-rule="evenodd" />
                </svg>
                <svg *ngIf="isLoading" class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg"
                    fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor"
                        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                    </path>
                </svg>
            </button>

            <p class="text-slate-500 font-semibold text-sm mt-4">
                Didn't receive the code?
                <button type="button" (click)="resendOtp()" [disabled]="isResending"
                    class="text-blue-700 hover:text-blue-800 bg-transparent p-0 transition-colors cursor-pointer disabled:opacity-50 inline-block font-semibold border-none align-baseline">
                    <span *ngIf="!isResending">Resend</span>
                    <span *ngIf="isResending">Sending...</span>
                </button>
            </p>

        </form>

    </main>

    <!-- Footer -->
    <footer class="w-full py-6 text-center text-xs font-semibold text-slate-400 mt-auto">
        © 2024 eduLearn Platform. All rights reserved.
    </footer>
</div>
