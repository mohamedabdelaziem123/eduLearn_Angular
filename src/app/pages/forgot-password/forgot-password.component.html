<div class="min-h-screen bg-slate-50 flex flex-col font-inter text-slate-800">

    <!-- Minimal Header -->
    <header class="w-full px-8 py-6 flex items-center justify-between col-span-12 shrink-0">
        <!-- Brand -->
        <a routerLink="/login"
            class="flex items-center gap-2 font-extrabold text-2xl text-slate-900 transition-opacity hover:opacity-80">
            <svg class="w-8 h-8 text-indigo-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                fill="currentColor">
                <path
                    d="M12 3L1 9l4 2.18V15c0 1.1.9 2 2 2h10a2 2 0 002-2v-3.82L23 9 12 3zm6 12H6v-2.73L12 15l6-2.73V15z" />
            </svg>
            <span>eduLearn</span>
        </a>

        <!-- Help Button -->
        <button
            class="w-10 h-10 rounded-full bg-indigo-50 text-indigo-700 flex items-center justify-center font-bold hover:bg-indigo-100 transition-colors">
            ?
        </button>
    </header>

    <!-- Main Content Centered -->
    <main class="flex-1 flex flex-col items-center justify-center px-4 w-full max-w-xl mx-auto -mt-16">

        <!-- Breadcrumb -->
        <div class="flex items-center gap-3 text-sm font-semibold mb-8">
            <span class="text-indigo-600">Forgot Password</span>
            <span class="text-slate-300">›</span>
            <span class="text-slate-400">OTP Verification</span>
            <span class="text-slate-300">›</span>
            <span class="text-slate-400">Set New Password</span>
        </div>

        <!-- Titles -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-slate-900 mb-3 tracking-tight">Forgot your password?</h1>
            <p class="text-slate-500 font-medium">Enter your email address to receive a 6-digit verification code.</p>
        </div>

        <!-- Form -->
        <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="w-full max-w-md w-full flex flex-col gap-6">

            <div class="flex flex-col gap-2">
                <label class="text-sm font-bold text-slate-700">Email Address</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
                        <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                            <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z" />
                            <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z" />
                        </svg>
                    </div>
                    <input type="email" formControlName="email" placeholder="example@email.com"
                        class="w-full pl-11 pr-4 py-3.5 bg-white border border-slate-200 rounded-2xl text-slate-800 placeholder-slate-400 font-medium focus:outline-none focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-500 transition-all shadow-sm">
                </div>
                <div *ngIf="forgotForm.get('email')?.touched && forgotForm.get('email')?.invalid"
                    class="text-red-500 text-xs font-semibold mt-1 pl-2">
                    <span *ngIf="forgotForm.get('email')?.errors?.['required']">Email is required.</span>
                    <span *ngIf="forgotForm.get('email')?.errors?.['email']">Please enter a valid email.</span>
                </div>
            </div>

            <!-- API Error Message -->
            <div *ngIf="errorMessage"
                class="p-3 bg-red-50 text-red-600 rounded-xl text-sm font-semibold border border-red-100 flex items-start gap-2">
                <svg class="w-5 h-5 shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"
                    fill="currentColor">
                    <path fill-rule="evenodd"
                        d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
                        clip-rule="evenodd" />
                </svg>
                <span>{{ errorMessage }}</span>
            </div>

            <button type="submit" [disabled]="isLoading"
                class="w-full py-4 bg-blue-700 text-white font-bold rounded-2xl shadow-lg shadow-blue-700/30 hover:bg-blue-800 hover:shadow-blue-700/40 disabled:opacity-70 disabled:cursor-not-allowed transition-all mt-2 flex justify-center items-center gap-2">
                <span *ngIf="!isLoading">Send Verification Code</span>
                <svg *ngIf="isLoading" class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg"
                    fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor"
                        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                    </path>
                </svg>
            </button>

            <a routerLink="/login"
                class="inline-flex justify-center items-center gap-2 text-blue-700 font-bold text-sm mt-4 hover:text-blue-800 transition-colors">
                <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd"
                        d="M9.707 14.707a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 1.414L7.414 9H15a1 1 0 110 2H7.414l2.293 2.293a1 1 0 010 1.414z"
                        clip-rule="evenodd" />
                </svg>
                Back to Login
            </a>

        </form>

    </main>

    <!-- Footer -->
    <footer class="w-full py-6 text-center text-xs font-semibold text-slate-400 mt-auto">
        © 2024 eduLearn Platform. All rights reserved.
    </footer>
</div>
