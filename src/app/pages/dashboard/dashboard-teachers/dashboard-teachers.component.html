<div class="flex h-screen bg-[#f8f9fc] font-sans">
    <app-side-bar [activeRoute]="'teachers'"></app-side-bar>

    <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
        <!-- Navbar -->
        <app-nav-bar [showFilter]="false" [showBell]="true"></app-nav-bar>

        <main class="flex-1 overflow-y-auto w-full">
            <!-- Dashboard Content -->
            <div class="p-8 max-w-[1200px] mx-auto">

                <!-- Header Component -->
                <div class="flex flex-col md:flex-row md:items-end justify-between gap-6 mb-8">
                    <div>
                        <h1 class="text-[32px] font-extrabold text-slate-900 tracking-tight">Teacher Directory</h1>
                        <p class="text-[15px] text-slate-500 mt-1 font-medium">Manage and organize your academic staff
                        </p>
                    </div>

                    <button routerLink="create"
                        class="h-11 px-6 bg-[#1811c7] hover:bg-blue-800 text-white text-[14px] font-bold rounded-full shadow-lg shadow-blue-900/20 transition-all flex items-center justify-center gap-2 relative overflow-hidden group shrink-0">
                        <span class="material-symbols-outlined text-[18px]">person_add</span> Register New Teacher
                    </button>
                </div>

                <!-- Filters -->
                <div
                    class="bg-white rounded-[32px] p-6 mb-8 flex items-center gap-6 shadow-[0_2px_10px_-4px_rgba(0,0,0,0.05)] border border-gray-100">
                    <div class="flex-1 max-w-[300px]">
                        <label class="block text-[13px] font-bold text-slate-800 mb-2">Filter by Subjects</label>
                        <div class="relative">
                            <select
                                class="w-full h-11 px-4 bg-[#f8f9fb] border border-gray-200 rounded-full text-[13px] text-slate-700 appearance-none focus:outline-none focus:ring-2 focus:ring-[#1811c7]/20 transition-all font-medium cursor-pointer">
                                <option value="" selected>All Subjects</option>
                                <option value="math">Mathematics</option>
                                <option value="science">Science</option>
                                <option value="history">History</option>
                            </select>
                            <span
                                class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none text-[20px]">expand_more</span>
                        </div>
                    </div>

                    <!-- Reset Button next to filters -->
                    <button
                        class="h-11 px-6 bg-white border border-gray-200 hover:bg-gray-50 text-slate-700 text-[13px] font-bold rounded-full transition-all mt-[26px]">
                        Reset Filters
                    </button>
                </div>

                <!-- Teacher Table -->
                <div
                    class="bg-white rounded-[32px] shadow-[0_2px_10px_-4px_rgba(0,0,0,0.05)] border border-gray-100 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse min-w-[800px]">
                            <thead>
                                <tr class="border-b border-gray-100">
                                    <th
                                        class="px-8 py-5 text-[11px] font-extrabold text-[#7b87c7] uppercase tracking-wider w-[35%]">
                                        Name</th>
                                    <th
                                        class="px-4 py-5 text-[11px] font-extrabold text-[#7b87c7] uppercase tracking-wider w-[25%]">
                                        Specialty</th>
                                    <th
                                        class="px-4 py-5 text-[11px] font-extrabold text-[#7b87c7] uppercase tracking-wider w-[25%]">
                                        Email</th>
                                    <th
                                        class="px-8 py-5 text-[11px] font-extrabold text-[#7b87c7] uppercase tracking-wider w-[15%] text-right">
                                        Actions</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-50">
                                <tr *ngFor="let teacher of teachers"
                                    class="hover:bg-slate-50/50 transition-colors group">
                                    <td class="px-8 py-5">
                                        <div class="flex items-center gap-4">
                                            <div
                                                class="w-11 h-11 rounded-full overflow-hidden bg-slate-100 shrink-0 shadow-sm border border-gray-200/50">
                                                <img [src]="teacher.avatar" alt="Avatar"
                                                    class="w-full h-full object-cover">
                                            </div>
                                            <div>
                                                <div class="text-[14px] font-extrabold text-slate-900 mb-0.5">{{
                                                    teacher.name }}</div>
                                                <div
                                                    class="text-[11px] font-bold text-slate-400/80 tracking-wide uppercase">
                                                    ID: {{ teacher.id }}</div>
                                            </div>
                                        </div>
                                    </td>
                                    <td class="px-4 py-5">
                                        <div class="flex items-center gap-2">
                                            <div class="w-2 h-2 rounded-full {{ teacher.dotColor }}"></div>
                                            <span class="text-[13px] font-bold text-slate-800">{{ teacher.subject
                                                }}</span>
                                        </div>
                                    </td>
                                    <td class="px-4 py-5">
                                        <a href="mailto:{{teacher.email}}"
                                            class="text-[13px] font-medium text-[#4f46e5] hover:underline">{{
                                            teacher.email }}</a>
                                    </td>
                                    <td class="px-8 py-5 text-right relative">
                                        <div class="flex items-center justify-end gap-3 text-slate-400">
                                            <button class="hover:text-[#1811c7] transition-colors" title="Edit Teacher">
                                                <span class="material-symbols-outlined text-[18px]">edit</span>
                                            </button>
                                            <button class="hover:text-red-500 transition-colors" title="Delete Teacher">
                                                <span class="material-symbols-outlined text-[18px]">delete</span>
                                            </button>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- Pagination -->
                    <div class="px-8 py-6 border-t border-gray-100 flex items-center justify-between">
                        <p class="text-[13px] font-bold text-[#5c68a4]">Showing 4 of 24 teachers</p>

                        <div class="flex items-center gap-2">
                            <button
                                class="w-9 h-9 rounded-full border border-gray-200 flex items-center justify-center text-slate-500 hover:bg-slate-50 transition-colors">
                                <span class="material-symbols-outlined text-[18px]">chevron_left</span>
                            </button>
                            <button
                                class="w-9 h-9 rounded-full bg-[#1811c7] text-white text-[13px] font-bold flex items-center justify-center shadow-md shadow-blue-500/20">
                                1
                            </button>
                            <button
                                class="w-9 h-9 rounded-full text-slate-700 text-[13px] font-bold hover:bg-slate-50 transition-colors flex items-center justify-center">
                                2
                            </button>
                            <button
                                class="w-9 h-9 rounded-full text-slate-700 text-[13px] font-bold hover:bg-slate-50 transition-colors flex items-center justify-center">
                                3
                            </button>
                            <button
                                class="w-9 h-9 rounded-full border border-gray-200 flex items-center justify-center text-slate-500 hover:bg-slate-50 transition-colors">
                                <span class="material-symbols-outlined text-[18px]">chevron_right</span>
                            </button>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>
</div>
