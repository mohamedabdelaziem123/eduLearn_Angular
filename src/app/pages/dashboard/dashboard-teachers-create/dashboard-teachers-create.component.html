<div class="flex h-screen bg-[#f8f9fc] font-sans">
    <app-side-bar [activeRoute]="'teachers'"></app-side-bar>

    <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
        <!-- Navbar -->
        <app-nav-bar [showFilter]="false" [showBell]="true"></app-nav-bar>

        <main class="flex-1 overflow-y-auto w-full">
            <!-- Dashboard Content -->
            <div class="p-8 max-w-[1200px] mx-auto">

                <!-- Breadcrumbs -->
                <div class="flex items-center text-[13px] font-semibold text-slate-500 gap-2 mb-8 w-fit text-blue-600">
                    <a routerLink="/dashboard"
                        class="hover:text-blue-800 transition-colors cursor-pointer">Dashboard</a>
                    <span class="material-symbols-outlined text-[14px] text-slate-400">chevron_right</span>
                    <a routerLink="/dashboard/teachers"
                        class="hover:text-blue-800 transition-colors cursor-pointer">Teachers</a>
                    <span class="material-symbols-outlined text-[14px] text-slate-400">chevron_right</span>
                    <span class="text-blue-700 font-bold">Add New Teacher</span>
                </div>

                <!-- Header -->
                <div class="mb-8">
                    <h1 class="text-[32px] font-extrabold text-slate-900 tracking-tight">Create Teacher Account</h1>
                    <p class="text-[15px] text-slate-500 mt-2 font-medium max-w-[600px] leading-relaxed">Enter the
                        necessary professional and contact information to register a new educator within the Blue
                        Moneyflow ecosystem.</p>
                </div>

                <!-- Main Form Area -->
                <div class="bg-white rounded-[32px] shadow-sm border border-gray-100 p-8 md:p-10 mb-8">

                    <form class="flex flex-col gap-10">

                        <!-- Section: Basic Profile -->
                        <div class="flex flex-col gap-6">
                            <div class="flex items-center gap-3 text-slate-900 border-b border-gray-100 pb-3">
                                <span class="material-symbols-outlined text-[24px] text-[#1811c7]">person</span>
                                <h2 class="text-[16px] font-bold">Basic Profile</h2>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <!-- Username -->
                                <div>
                                    <label class="block text-[13px] font-bold text-slate-800 mb-2">Username</label>
                                    <input type="text" placeholder="e.g. jdoe_science"
                                        class="w-full h-12 px-5 bg-[#f8f9fb] border border-gray-200 rounded-full text-[14px] text-slate-700 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-[#1811c7]/20 focus:border-[#1811c7]/50 transition-all font-medium">
                                </div>

                                <!-- Email -->
                                <div>
                                    <label class="block text-[13px] font-bold text-slate-800 mb-2">Email Address</label>
                                    <input type="email" placeholder="john.doe@academy.edu"
                                        class="w-full h-12 px-5 bg-[#f8f9fb] border border-gray-200 rounded-full text-[14px] text-slate-700 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-[#1811c7]/20 focus:border-[#1811c7]/50 transition-all font-medium">
                                </div>

                                <!-- Phone -->
                                <div>
                                    <label class="block text-[13px] font-bold text-slate-800 mb-2">Phone Number</label>
                                    <input type="tel" placeholder="+1 (555) 000-0000"
                                        class="w-full h-12 px-5 bg-[#f8f9fb] border border-gray-200 rounded-full text-[14px] text-slate-700 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-[#1811c7]/20 focus:border-[#1811c7]/50 transition-all font-medium">
                                </div>

                                <!-- Specialty -->
                                <div>
                                    <label class="block text-[13px] font-bold text-slate-800 mb-2">Specialty</label>
                                    <input type="text" placeholder="e.g. Mathematics"
                                        class="w-full h-12 px-5 bg-[#f8f9fb] border border-gray-200 rounded-full text-[14px] text-slate-700 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-[#1811c7]/20 focus:border-[#1811c7]/50 transition-all font-medium">
                                </div>
                            </div>
                        </div>

                        <!-- Section: Expertise & Details -->
                        <div class="flex flex-col gap-6">
                            <div class="flex items-center gap-3 text-slate-900 border-b border-gray-100 pb-3">
                                <span class="material-symbols-outlined text-[24px] text-[#1811c7]">school</span>
                                <h2 class="text-[16px] font-bold">Expertise & Details</h2>
                            </div>

                            <div class="flex flex-col gap-6">
                                <!-- Address -->
                                <div>
                                    <label class="block text-[13px] font-bold text-slate-800 mb-2">Full Residential
                                        Address</label>
                                    <input type="text" placeholder="Street, City, State, ZIP"
                                        class="w-full h-12 px-5 bg-[#f8f9fb] border border-gray-200 rounded-full text-[14px] text-slate-700 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-[#1811c7]/20 focus:border-[#1811c7]/50 transition-all font-medium">
                                </div>

                                <!-- Description of Expertise -->
                                <div>
                                    <label class="block text-[13px] font-bold text-slate-800 mb-2">Description of
                                        Expertise</label>
                                    <textarea
                                        placeholder="Briefly describe teaching experience, research areas, and notable certifications..."
                                        class="w-full h-32 px-5 py-4 bg-[#f8f9fb] border border-gray-200 rounded-[24px] text-[14px] text-slate-700 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-[#1811c7]/20 focus:border-[#1811c7]/50 transition-all font-medium resize-none"></textarea>
                                </div>
                            </div>
                        </div>

                        <!-- Actions -->
                        <div class="flex items-center justify-end gap-5 pt-4 mt-2">
                            <button type="button"
                                class="h-12 px-8 bg-white border border-gray-200 hover:bg-gray-50 text-slate-700 text-[14px] font-bold rounded-full transition-all">
                                Cancel
                            </button>
                            <button type="submit"
                                class="h-12 px-8 bg-[#1811c7] hover:bg-blue-800 text-white text-[14px] font-bold rounded-full shadow-lg shadow-blue-900/20 transition-all flex items-center justify-center gap-2 group">
                                <span class="material-symbols-outlined text-[18px]">how_to_reg</span> Register Teacher
                            </button>
                        </div>

                    </form>
                </div>

            </div>
        </main>
    </div>
</div>
